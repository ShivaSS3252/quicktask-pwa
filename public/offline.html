<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickTask — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #030712;
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: system-ui, sans-serif;
      gap: 16px;
    }
    h1 { font-size: 2rem; color: #6366f1; }
    p { color: #9ca3af; font-size: 1rem; }
    span { font-size: 4rem; }
  </style>
</head>
<body>
  <span>📡</span>
  <h1>You're Offline</h1>
  <p>Don't worry — your tasks are saved locally.</p>
  <p>We'll sync everything when you're back online.</p>
</body>
</html>
